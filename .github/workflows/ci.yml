name: CI

on:
    push:
        branches: [main, master, develop]
    pull_request:
        branches: [main, master, develop]

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    check:
        name: Check
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Setup Vite+
              uses: voidzero-dev/setup-vp@v1
              with:
                  node-version-file: ".nvmrc"
                  cache: true
                  run-install: true

            - name: Run check
              run: vp check

    test:
        name: Test
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Setup Vite+
              uses: voidzero-dev/setup-vp@v1
              with:
                  node-version-file: ".nvmrc"
                  cache: true
                  run-install: true

            - name: Run UI tests
              run: pnpm test:ui
