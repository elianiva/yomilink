name: CI

on:
    push:
        branches: [main, master, develop]
    pull_request:
        branches: [main, master, develop]

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    lint:
        name: Lint
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Setup Vite+
              uses: voidzero-dev/setup-vp@v1
              with:
                  node-version-file: ".nvmrc"
                  cache: true
                  run-install: true

            - name: Run linter
              run: vp lint

    format:
        name: Format Check
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Setup Vite+
              uses: voidzero-dev/setup-vp@v1
              with:
                  node-version-file: ".nvmrc"
                  cache: true
                  run-install: true

            - name: Check formatting
              run: |
                  vp fmt
                  git diff --exit-code || (echo "::error::Code is not formatted. Run 'vp fmt' locally and commit the changes." && exit 1)

    typecheck:
        name: Type Check
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Setup Vite+
              uses: voidzero-dev/setup-vp@v1
              with:
                  node-version-file: ".nvmrc"
                  cache: true
                  run-install: true

            - name: Run type check
              run: vp run typecheck

    test:
        name: Test
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Setup Vite+
              uses: voidzero-dev/setup-vp@v1
              with:
                  node-version-file: ".nvmrc"
                  cache: true
                  run-install: true

            - name: Run tests
              run: vp test
